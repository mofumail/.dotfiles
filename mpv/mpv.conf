# --- General ---
profile=high-quality      # Built-in profile for high quality scaling/dithering
vo=gpu-next               # The modern renderer (libplacebo based), allows Dolby Vision, HDR tone mapping, etc.
gpu-api=vulkan            # Best performance on CachyOS (usually)
hwdec=auto-safe           # Hardware decoding

# --- Anime Specifics ---
deband=yes                # Essential for anime to remove color banding (sky gradients)
deband-iterations=2       # Range 1-4. 2 is a safe bet.
deband-threshold=35       # Range 0-4096. 35 is good for anime.
deband-grain=4            # Inject a little grain to hide artifacts

# --- Subtitles ---
sub-auto=fuzzy            # Load subs even if filename isn't 100% match
# sub-font='Trebuchet MS'   # Pick a clean font you like
# sub-bold=yes
slang=jpn,jp,eng,en       # Audio language priority
alang=jpn,jp,eng,en       # Subtitle language priority

# --- Screenshots ---
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-directory=~/Pictures/Screenshots

# --- Cache ---
cache=yes
demuxer-max-bytes=150M    # Good for high bitrate MKVs
