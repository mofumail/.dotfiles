[[mgr.prepend_keymap]]
on = "j"
run = "prev"
desc = "Move up"

[[mgr.prepend_keymap]]
on = "k"
run = "next"
desc = "Move up"

[[mgr.prepend_keymap]]
on = "W"
run = "shell -- ln -sf %h ~/.config/background && swww img %h --transition-type grow --transition-pos 0.854,0.977 --transition-duration 2 && hyprpanel setWallpaper %h"
desc = "Set image as wallpaper"

[[mgr.prepend_keymap]]
on = "<A-h>"
run = "leave"
desc = "Go to parent dir"

[[mgr.prepend_keymap]]
on = "<A-l>"
run = "enter"
desc = "Enter dir"

